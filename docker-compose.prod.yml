
services:
  # ─── PostgreSQL ──────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: agentbloom
      POSTGRES_USER: agentbloom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentbloom_prod_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbloom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend (Daphne ASGI) ───────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=agentbloom.settings
      - ENVIRONMENT=production
      - DEBUG=False
      - DATABASE_URL=postgresql://agentbloom:${DB_PASSWORD:-agentbloom_prod_pass}@db:5432/agentbloom
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 agentbloom.asgi:application"

  # ─── Celery Worker ──────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=agentbloom.settings
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://agentbloom:${DB_PASSWORD:-agentbloom_prod_pass}@db:5432/agentbloom
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A agentbloom worker -l warning --concurrency=2

  # ─── Celery Beat ────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=agentbloom.settings
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://agentbloom:${DB_PASSWORD:-agentbloom_prod_pass}@db:5432/agentbloom
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A agentbloom beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─── Next.js Frontend (Production) ──────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://bloom.nobleblocks.com
      - NEXT_PUBLIC_WS_URL=wss://bloom.nobleblocks.com

volumes:
  pgdata:
  redisdata:
